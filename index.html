<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6529 Cloud Report</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.scene {
  position: relative;
  width: 1350px;
  height: 1080px;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  max-width: 100%;
}
.cloud-img {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}
.effects {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
  border-radius: 12px;
}
@keyframes cloudBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.015); }
}
.cloud-img {
  animation: cloudBreathe 8s ease-in-out infinite;
  transform-origin: center 40%;
}
@keyframes vignettePulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.5; }
}
.vignette {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 3;
  pointer-events: none;
  border-radius: 12px;
  box-shadow: inset 0 0 100px rgba(0,0,0,0.4);
  animation: vignettePulse 6s ease-in-out infinite;
}
@keyframes particleFloat {
  0%, 100% { transform: translate(0, 0); opacity: 0.3; }
  25% { transform: translate(10px, -15px); opacity: 0.5; }
  50% { transform: translate(-5px, -25px); opacity: 0.3; }
  75% { transform: translate(-12px, -10px); opacity: 0.4; }
}
.particle {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  z-index: 2;
  pointer-events: none;
  animation: particleFloat ease-in-out infinite;
}
.info {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  letter-spacing: 1px;
  white-space: nowrap;
}
.info a {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
}
.info a:hover {
  color: rgba(255,255,255,0.7);
}
@media (max-width: 1400px) {
  .scene { width: 100vw; height: 80vw; max-height: 80vh; }
}
</style>
</head>
<body>
<div class="scene">
  <img class="cloud-img" src="cloud_report.png" alt="6529 Cloud Report">
  <div class="effects" id="effects"></div>
  <div class="vignette"></div>
</div>
<script>
(function() {
  var effects = document.getElementById('effects');
  // Floating particles
  for (var i = 0; i < 20; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (Math.random() * 100) + '%';
    p.style.top = (20 + Math.random() * 60) + '%';
    p.style.background = 'rgba(180,200,230,0.4)';
    p.style.animationDuration = (6 + Math.random() * 8) + 's';
    p.style.animationDelay = (Math.random() * 4) + 's';
    effects.appendChild(p);
  }
})();
</script>
</body>
</html>
