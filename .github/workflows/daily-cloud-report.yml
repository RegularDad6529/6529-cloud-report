name: Daily Cloud Report

on:
  schedule:
    # Run at 06:00 and 18:00 UTC every day
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Allow manual runs

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install wordcloud vaderSentiment pillow numpy

      - name: Test API connectivity
        env:
          TOKEN_6529: ${{ secrets.TOKEN_6529 }}
        run: |
          python3 -c "
          import urllib.request, json
          token = '$TOKEN_6529'
          req = urllib.request.Request('https://api.6529.io/api/waves?limit=1',
              headers={'Authorization': f'Bearer {token}', 'Accept': 'application/json'})
          try:
              resp = urllib.request.urlopen(req, timeout=15)
              data = json.loads(resp.read())
              print(f'API OK: {len(data) if isinstance(data, list) else len(data.get(\"waves\", data.get(\"data\", [])))} waves')
          except Exception as e:
              print(f'API ERROR: {e}')
              raise
          "

      - name: Generate Cloud Report
        env:
          TOKEN_6529: ${{ secrets.TOKEN_6529 }}
          CAPTION_PATH: cloud_caption.txt
          PYTHONUNBUFFERED: '1'
        timeout-minutes: 10
        run: |
          set -x
          python cloud_report.py --daily --output cloud_report.png
          echo "EXIT_CODE=$?"
          ls -la cloud_report.png
          # Write caption
          echo "Daily Cloud Report — $(date -u '+%Y-%m-%d %H:%M UTC')" > cloud_caption.txt
          cat cloud_caption.txt

      - name: Commit and push
        run: |
          git config user.name "TheManager"
          git config user.email "noreply@6529.io"
          git add cloud_report.png
          git commit -m "Cloud Report update $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push

      - name: Post to 6529.io wave
        env:
          TOKEN_6529: ${{ secrets.TOKEN_6529 }}
        run: |
          CAPTION=$(cat cloud_caption.txt)
          python post_to_wave.py cloud_report.png "$CAPTION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-report
          path: cloud_report.png
          retention-days: 30